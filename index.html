<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dondurulmuş Meyve & Sebze İthalatı — Ön Teklif Al</title>
  <meta name="description" content="Dondurulmuş meyve ve sebze ithalatı için hızlı ön teklif. Toptan tedarik, kalite kontrol, soğuk zincir, zamanında teslimat." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍓</text></svg>" />
  <link rel="stylesheet" href="css/styles.css?v=32" />
</head>
<body>

  <!-- ===================== ANA SAYFA (poster) ===================== -->
  <header class="home" id="hero">
    <div class="poster">
      <img class="poster__img" src="assets/anasayfa.jpg?v=2"
           alt="Klüp Dış Ticaret — Dondurulmuş meyve, sebze, deniz ürünleri ve bakliyat için ön teklif alın. Güvenilir tedarik, kalite kontrol, zamanında teslimat, -18°C soğuk zincir, 27 yıllık tecrübe." />
      <button class="poster__cta" id="startBtn" type="button"
              aria-label="Hemen Teklif Al — ön teklif sürecini başlat"></button>
    </div>
  </header>

  <!-- ===================== FUNNEL ===================== -->
  <main class="funnel" id="funnel" hidden>
    <div class="funnel__bar">
      <div class="funnel__progress" id="progress"></div>
    </div>
    <div class="funnel__stepwrap">
      <div class="funnel__stepinfo">
        <span id="stepCounter">Adım 1</span>
        <button class="link-back" id="backBtn" hidden>← Geri</button>
      </div>
      <div id="stepContent"><!-- adımlar JS ile basılır --></div>
    </div>
  </main>

  <footer class="site-footer">
    <p class="muted">Bu site bir ön teklif aracıdır. Nihai fiyatlar görüşme sonrası netleşir.</p>
    <p>© <span id="year"></span> Klüp Dış Ticaret — Dondurulmuş Meyve & Sebze, Deniz Ürünleri ve Bakliyat İthalatı</p>
  </footer>

  <!-- Supabase (merkezi lead kaydı için) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Uygulama dosyaları -->
  <script src="js/config.js?v=19"></script>
  <script src="js/supabase.js?v=19"></script>
  <script src="js/products.js?v=27"></script>
  <script src="js/scoring.js?v=28"></script>
  <script src="js/proposal.js?v=19"></script>
  <script src="js/funnel.js?v=27"></script>
</body>
</html>
